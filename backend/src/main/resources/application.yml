spring:
  application:
    name: learningtube
  security:
    oauth2:
      client:
        registration:
          google:
            # GOOGLE_CLIENT_ID / SECRET 필수.
            # Google Cloud Console → OAuth 클라이언트 → 승인된 리디렉션 URI (앱이 보내는 값과 문자 단위로 동일):
            #   예: http://localhost:8080/login/oauth2/code/google
            #   공개 HTTPS 로 접속하면: https://<실제-브라우저-호스트>/login/oauth2/code/google 도 콘솔에 등록
            #   프론트만 5173 등이면 그 호스트 기준 URI 가 필요할 수 있음
            # {baseUrl} 은 server.forward-headers-strategy=framework + 프록시 X-Forwarded-* 로 결정됨.
            # 자동 계산이 틀리면 GOOGLE_REDIRECT_URI 로 전체 URI 고정.
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: "${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/google}"
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/youtube.readonly
  datasource:
    url: jdbc:h2:mem:learningtube;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16
        jdbc:
          time_zone: UTC

server:
  port: 8080
  address: 0.0.0.0
  # 리버스 프록시 뒤에서 redirect_uri·{baseUrl} 이 브라우저가 보는 공개 URL을 쓰도록 X-Forwarded-* 반영
  # (spring.forward-headers-strategy 는 존재하지 않는 키라 무시됨 — 반드시 server. 아래에 둘 것)
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    root: INFO
    com.myapp.learningtube: DEBUG
    com.myapp.learningtube.global.logging.HttpRequestLoggingFilter: INFO
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  # 개발 테스트용: access token 만료를 사실상 없게(1년).
  # 운영에서는 반드시 짧게(예: 15분~1시간) 유지하고 refresh 정책으로 갱신하세요.
  access-token-validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY_MS:31536000000}

# GIS ID 토큰 검증 등 — OAuth2 Client 와 동일 키 사용
google:
  auth:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

learningtube:
  auth:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://192.168.0.5:5173
      - http://192.168.0.5:3000
    allow-credentials: true
    exposed-headers:
      - X-Request-Id
      - X-Trace-Id
    max-age-seconds: 3600
  # YouTube Data API — false: 실제 subscriptions.list(내 구독). true: 고정 2채널 스텁. CI/오프라인은 YOUTUBE_STUB=true
  youtube:
    stub: ${YOUTUBE_STUB:false}
    api-base-url: https://www.googleapis.com/youtube/v3
    channel-updates-max-videos-per-channel: 15
  dashboard:
    today-pick-limit: 5
    today-pick-candidate-pool: 40
    continue-watching-limit: 10
    recent-notes-limit: 8
    incomplete-videos-limit: 10
    favorite-subscriptions-limit: 5
    favorite-channel-recent-videos-limit: 3
  analytics:
    max-daily-buckets: 366
    week-days: 7
    month-days: 30
