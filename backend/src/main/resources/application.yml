spring:
  application:
    name: learningtube
  forward-headers-strategy: framework
  security:
    oauth2:
      client:
        registration:
          google:
            # GOOGLE_CLIENT_ID / SECRET 필수. 승인 리디렉션: http://<백엔드>/login/oauth2/code/google
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/youtube.readonly
  datasource:
    url: jdbc:h2:mem:learningtube;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16
        jdbc:
          time_zone: UTC

server:
  port: 8080
  address: 0.0.0.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    root: INFO
    com.myapp.learningtube: DEBUG
    com.myapp.learningtube.global.logging.HttpRequestLoggingFilter: INFO
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  access-token-validity-ms: 900000

# GIS ID 토큰 검증 등 — OAuth2 Client 와 동일 키 사용
google:
  auth:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

learningtube:
  auth:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://192.168.0.5:5173
      - http://192.168.0.5:3000
    allow-credentials: true
    exposed-headers:
      - X-Request-Id
      - X-Trace-Id
    max-age-seconds: 3600
  youtube:
    stub: true
    api-base-url: https://www.googleapis.com/youtube/v3
    channel-updates-max-videos-per-channel: 15
  dashboard:
    today-pick-limit: 5
    today-pick-candidate-pool: 40
    continue-watching-limit: 10
    recent-notes-limit: 8
    incomplete-videos-limit: 10
    favorite-subscriptions-limit: 5
    favorite-channel-recent-videos-limit: 3
  analytics:
    max-daily-buckets: 366
    week-days: 7
    month-days: 30
